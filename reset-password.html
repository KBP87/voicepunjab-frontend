<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - VoicePunjabAI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">

    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-link">
          <div class="logo-wrap">
            <img src="images/logo.png" alt="VoicePunjabAI logo" class="site-logo" />
          </div>
          <div>
            <div class="title">VoicePunjabAI</div>
            <div class="subtitle">Punjabi Text-to-Speech</div>
          </div>
        </a>
      </div>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
      </nav>

      <div class="header-right">
        <div class="status ok">Reset Password</div>
      </div>
    </header>

    <section class="intro-strip">
      <p>
        Enter a new password for your VoicePunjabAI account.
      </p>
    </section>

    <section class="card" style="margin-top:20px; max-width:700px;">
      <h2>Reset Password</h2>
      <p class="small">
        Use a strong password with at least 6 characters.
      </p>

      <form id="resetForm" style="margin-top:14px;">
        <label class="labelBlock" for="resetPassword">New Password</label>
        <input
          type="password"
          id="resetPassword"
          placeholder="Minimum 6 characters"
          required
        >

        <label class="labelBlock" for="resetPassword2">Confirm Password</label>
        <input
          type="password"
          id="resetPassword2"
          placeholder="Re-enter new password"
          required
        >

        <div class="btnrow">
          <button type="submit" class="primary">Update Password</button>
          <a href="login.html" class="btn-link secondary">Back to Login</a>
        </div>

        <div id="resetNote" class="small">
          Waiting for a valid reset link.
        </div>
      </form>
    </section>

    <footer class="site-footer">
      <div class="footer-bottom">
        <div class="footer-note">© 2026 VoicePunjabAI. All rights reserved.</div>
      </div>
    </footer>
  </div>

  <script>
    const API_BASE = "https://voicepunjab-api-777821135954.us-central1.run.app";

    const resetForm = document.getElementById("resetForm");
    const resetNote = document.getElementById("resetNote");

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";

    if (!token) {
      resetNote.textContent = "Invalid reset link.";
      resetForm.style.display = "none";
    }

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("resetPassword").value;
      const confirmPassword = document.getElementById("resetPassword2").value;

      if (password !== confirmPassword) {
        resetNote.textContent = "Passwords do not match.";
        return;
      }

      resetNote.textContent = "Updating password...";

      try {
        const res = await fetch(API_BASE + "/api/reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token,
            password
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Could not reset password.");
        }

        resetNote.textContent =
          data.message || "Password updated successfully. You can now log in.";

        resetForm.reset();
      } catch (err) {
        resetNote.textContent = err.message || "Could not reset password.";
      }
    });
  </script>
</body>
</html>
